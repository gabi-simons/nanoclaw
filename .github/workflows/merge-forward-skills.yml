name: Merge-forward skill branches

on:
  push:
    branches: [main]

concurrency:
  group: merge-forward-skills
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  merge-forward:
    if: github.repository == 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into each skill branch
        id: merge
        run: |
          FAILED=""
          SUCCEEDED=""

          # List all remote skill branches
          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)

          if [ -z "$SKILL_BRANCHES" ]; then
            echo "No skill branches found."
            exit 0
          fi

          for BRANCH in $SKILL_BRANCHES; do
            SKILL_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            # Checkout the skill branch
            git checkout -B "$BRANCH" "origin/$BRANCH"

            # Attempt merge
            if ! git merge main --no-edit; then
              # Auto-resolve trivial conflicts
              CONFLICTED=$(git diff --name-only --diff-filter=U)
              CAN_AUTO=true
              for f in $CONFLICTED; do
                case "$f" in
                  package-lock.json|package.json|repo-tokens/badge.svg)
                    git checkout --theirs "$f"
                    git add "$f"
                    ;;
                  *)
                    CAN_AUTO=false
                    ;;
                esac
              done
              if [ "$CAN_AUTO" = false ]; then
                echo "::warning::Merge conflict in $BRANCH"
                git merge --abort
                FAILED="$FAILED $SKILL_NAME"
                continue
              fi
              git commit --no-edit
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SKILL_NAME"
              continue
            fi

            # Install deps and validate
            if ! npm ci; then
              echo "::warning::npm ci failed for $BRANCH, regenerating lockfile"
              if ! (npm install --package-lock-only && npm ci); then
                echo "::warning::Dependency install failed for $BRANCH"
                git reset --hard "origin/$BRANCH"
                FAILED="$FAILED $SKILL_NAME"
                continue
              fi
              git add package-lock.json
              git commit --no-verify -m "chore: regenerate package-lock.json after merge from main"
            fi

            if ! npm run build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if ! npm test 2>/dev/null; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            # Push the updated branch
            if ! git push origin "$BRANCH"; then
              echo "::warning::Push failed for $BRANCH, fetching and retrying"
              git fetch origin "$BRANCH"
              if ! git rebase --rebase-merges "origin/$BRANCH" || ! git push origin "$BRANCH"; then
                echo "::warning::Push retry failed for $BRANCH"
                git rebase --abort 2>/dev/null || true
                git reset --hard "origin/$BRANCH"
                FAILED="$FAILED $SKILL_NAME"
                continue
              fi
            fi
            SUCCEEDED="$SUCCEEDED $SKILL_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          # Export for issue creation
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open or update issue for failed merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        env:
          FAILED_SKILLS: ${{ steps.merge.outputs.failed }}
        with:
          script: |
            const failed = process.env.FAILED_SKILLS.trim().split(/\s+/);
            const sha = context.sha.substring(0, 7);

            // Check for existing open skill-maintenance issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'skill-maintenance',
              state: 'open',
              per_page: 1,
            });

            const entry = `- ${sha}: ${failed.map(s => `\`skill/${s}\``).join(', ')}`;

            if (existing.length > 0) {
              // Append to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Merge-forward failed again after ${sha}:\n\n${entry}\n\nResolve manually:\n\`\`\`bash\n${failed.map(s => `git checkout skill/${s}\ngit merge main\n# resolve conflicts, then: git push`).join('\n\n')}\n\`\`\``,
              });
              console.log(`Updated existing issue #${existing[0].number}`);
            } else {
              // Create new tracking issue
              const body = [
                'The merge-forward workflow is failing for the following skill branches.',
                'This issue will be updated with each subsequent failure until resolved.',
                '',
                '## Failures',
                '',
                entry,
                '',
                '## How to resolve',
                '```bash',
                ...failed.map(s => [
                  `git checkout skill/${s}`,
                  `git merge main`,
                  `# resolve conflicts, then: git push`,
                  ''
                ]).flat(),
                '```',
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Merge-forward failing for skill branches`,
                body,
                labels: ['skill-maintenance']
              });
            }

      - name: Notify channel forks
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FORK_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const forks = [
              'nanoclaw-whatsapp',
              'nanoclaw-telegram',
              'nanoclaw-discord',
              'nanoclaw-slack',
              'nanoclaw-gmail',
              'nanoclaw-docker-sandboxes',
              'nanoclaw-docker-sandbox',
              'nanoclaw-docker-sandbox-windows',
              'nanoclaw-signal',
              'nanoclaw-matrix',
            ];
            const sha = context.sha.substring(0, 7);
            for (const repo of forks) {
              try {
                await github.rest.repos.createDispatchEvent({
                  owner: 'qwibitai',
                  repo,
                  event_type: 'upstream-main-updated',
                  client_payload: { sha: context.sha },
                });
                console.log(`Notified ${repo}`);
              } catch (e) {
                console.log(`Failed to notify ${repo}: ${e.message}`);
              }
            }
