name: L4 smoke (credential-free)

# POC: prove the credential-free deterministic floor in CI. GitHub's ubuntu-latest
# runners have Docker preinstalled, so this runs the real-container round-trip that
# can't run on a dev box without a Docker daemon. No secrets are used.
on:
  push:
    branches: ['feat/poc-stub-provider-smoke']
  workflow_dispatch:

jobs:
  # L4 in miniature — provider-injection seam, no Docker, no credentials.
  l4-inprocess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: pnpm install --frozen-lockfile
      - name: Install agent-runner deps (Bun)
        working-directory: container/agent-runner
        run: bun install --frozen-lockfile
      - name: StubProvider injection seam (createProvider → messages_out)
        working-directory: container/agent-runner
        run: bun test src/providers/stub.smoke.test.ts

  # L4 full — real container spawns with NO OneCLI gateway and NO creds.
  l4-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: pnpm install --frozen-lockfile
      - name: Install agent-runner deps (Bun)
        working-directory: container/agent-runner
        run: bun install --frozen-lockfile
      - name: Build agent container image
        run: ./container/build.sh
      - name: Credential-free round-trip (inbound → container → outbound, golden assert)
        run: pnpm exec tsx scripts/smoke-stub.ts
